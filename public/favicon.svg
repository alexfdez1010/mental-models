<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Mental Models">
  <!-- Brutalist tile: hot orange, hard near-black edge -->
  <rect x="3" y="3" width="58" height="58" rx="13" fill="#f97316" stroke="#1c1917" stroke-width="4"/>
  <!-- Latticework: connected ideas (the mental-models metaphor) -->
  <g stroke="#1c1917" stroke-width="3.4" stroke-linecap="round">
    <line x1="32" y1="17" x2="16" y2="47"/>
    <line x1="32" y1="17" x2="48" y2="47"/>
    <line x1="16" y1="47" x2="48" y2="47"/>
    <line x1="32" y1="17" x2="32" y2="38"/>
    <line x1="16" y1="47" x2="32" y2="38"/>
    <line x1="48" y1="47" x2="32" y2="38"/>
  </g>
  <!-- Nodes: white outer, amber core -->
  <g stroke="#1c1917" stroke-width="3">
    <circle cx="32" cy="17" r="6.2" fill="#ffffff"/>
    <circle cx="16" cy="47" r="6.2" fill="#ffffff"/>
    <circle cx="48" cy="47" r="6.2" fill="#ffffff"/>
    <circle cx="32" cy="38" r="6.6" fill="#fcd34d"/>
  </g>
</svg>
